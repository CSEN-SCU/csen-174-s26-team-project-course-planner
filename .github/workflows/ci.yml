name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: "npm"
          cache-dependency-path: project/package-lock.json

      - name: Install Node dependencies (Vitest + bridge test stack)
        working-directory: project
        run: npm ci

      - name: Run project test suite (Vitest under project/tests)
        working-directory: project
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm test

