name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            project/course_planner/package-lock.json
            project/course_planner/tests/package-lock.json

      - name: Install course_planner dependencies
        working-directory: project/course_planner
        run: npm ci

      - name: Run course_planner tests (project/course_planner/tests)
        working-directory: project/course_planner/tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm test

